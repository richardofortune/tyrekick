name: Publish to npm

# Manually triggered from the Actions tab: pick which package to publish.
# Publishes with Sigstore provenance (npm attests the package was built
# from this repo + workflow), which requires id-token: write and a public repo.
#
# Auth: set an npm granular "automation" token as the NPM_TOKEN repo secret.
# If you later configure npm Trusted Publishing (OIDC) for these packages,
# the NODE_AUTH_TOKEN lines can be deleted entirely.

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - tyrekick
          - tyrekick-mcp

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish tyrekick
        if: inputs.package == 'tyrekick'
        run: |
          npm ci
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish tyrekick-mcp
        if: inputs.package == 'tyrekick-mcp'
        working-directory: mcp
        run: |
          npm ci
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
